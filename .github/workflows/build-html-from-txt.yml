# .github/workflows/build-html-from-txt.yml
name: Build HTML from TXT
on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 4,6,8,12,14,18,20,0 * * *'  # 每天4/6/8/12/14/18/20/0点整触发（0点=24点）
  push:
    paths:
      - 'doc/**'  # doc文件夹变更时自动触发（可选）

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制使用Node.js 24

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24  # 升级到Node.js 24
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: 检测doc文件夹是否变更（增量检测）
        id: check_doc
        run: |
          # 获取上次提交的doc文件夹哈希
          LAST_HASH=$(git log -1 --pretty=format:%H -- doc/ 2>/dev/null || echo "none")
          # 获取当前doc文件夹哈希
          CURRENT_HASH=$(git rev-parse HEAD:doc/ 2>/dev/null || echo "none")
          # 输出结果供后续步骤使用
          if [ "$LAST_HASH" = "$CURRENT_HASH" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ doc文件夹无变更，终止编译"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🔄 doc文件夹已变更，开始编译"
          fi

      - name: 安装模板引擎依赖
        if: steps.check_doc.outputs.changed == 'true'
        run: |
          npm install
          npm cache clean --force

      - name: 编译TXT到HTML（仅当有变更时）
        if: steps.check_doc.outputs.changed == 'true'
        run: node scripts/build-html.js

      - name: 提交HTML文件
        if: steps.check_doc.outputs.changed == 'true'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add dist/
          if git diff --quiet --staged; then
            echo "✅ 无HTML变更，跳过提交"
          else
            git commit -m "chore: build html from txt [skip ci]"
            git push
          fi
