# .github/workflows/build-html-from-txt.yml
name: Build HTML from TXT

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4,6,8,12,14,18,20,0 * * *'
  push:
    paths:
      - 'doc/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: 检测doc文件夹变更
        id: check_doc
        run: |
          LAST_HASH=$(git log -1 --pretty=format:%H -- doc/ 2>/dev/null || echo "none")
          CURRENT_HASH=$(git rev-parse HEAD:doc/ 2>/dev/null || echo "none")
          if [ "$LAST_HASH" = "$CURRENT_HASH" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ doc无变更，终止编译"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "🔄 doc有变更，开始编译"
          fi

      - name: 安装依赖
        if: steps.check_doc.outputs.changed == 'true'
        run: |
          npm install --force
          npm cache clean --force

      - name: 编译HTML
        if: steps.check_doc.outputs.changed == 'true'
        run: node scripts/build-html.js

      - name: 提交HTML
        if: steps.check_doc.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ || true
          if ! git diff --quiet --staged; then
            git commit -m "chore: build html from txt [skip ci]"
            git push origin HEAD:main --force-with-lease
            echo "✅ HTML提交成功"
          else
            echo "✅ 无HTML变更，跳过提交"
          fi

      # ===== 新增：部署到Netlify（仅当doc有变更时执行）=====
      - name: 部署到Netlify
        if: steps.check_doc.outputs.changed == 'true'
        uses: netlify/actions/cli@master
        with:
          # 部署dist目录到生产环境，覆盖Netlify原有内容
          args: deploy --prod --dir=dist
        env:
          # 引用GitHub Secrets中配置的密钥（需提前添加）
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      # ===== 新增：输出部署结果 =====
      - name: 部署结果提示
        if: steps.check_doc.outputs.changed == 'true'
        run: echo "✅ Netlify部署完成！可访问你的Netlify站点查看最新内容"
