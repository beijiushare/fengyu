# .github/workflows/fetch-issues-to-txt.yml
name: Fetch Issues to TXT
on:
  workflow_dispatch:  # 手动触发
  schedule:
    - cron: '0 2,5,7,11,13,17,19,23 * * *'  # 每天2/5/7/11/13/17/19/23点整触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm install @octokit/rest

      - name: 拉取 Issue 并生成 TXT（带增量检测）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: node scripts/fetch-issues-to-txt.js

      - name: 提交 TXT 文件变更（仅当有变更时）
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add doc/ data-hash.txt
          # 检测是否有变更，无变更则跳过提交
          if git diff --quiet --staged; then
            echo "✅ 无内容变更，跳过提交"
          else
            git commit -m "chore: update issues to txt [skip ci]"
            git push
          fi
